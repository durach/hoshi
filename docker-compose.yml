services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./tokens.json:/app/tokens.json:ro
    expose:
      - "8000"

  frontend:
    build: ./frontend
    environment:
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-changeme}
      - WS_TOKEN=${WS_TOKEN:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
